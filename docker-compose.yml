services:
  streamlit:
    build: .
    container_name: kpi-report
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - cache_data:/app/.cache

  nginx:
    image: nginx:alpine
    container_name: kpi-nginx
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - streamlit

volumes:
  cache_data:
